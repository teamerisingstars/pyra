app = "your-pyra-app"
primary_region = "iad"

[build]

[http_service]
  internal_port = 7340
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  PYRA_HOST = "0.0.0.0"
  PYRA_PORT = "7340"
